name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run code quality checks (formatting, linting)
        run: |
          uv run ruff format --check .
          uv run isort --check-only .
          uv run ruff check .

      - name: Run type checking
        run: uv run mypy mcp_server/

      - name: Run security scanning
        run: uv run bandit -r mcp_server/ -c pyproject.toml

      - name: Run unit tests
        run: uv run pytest tests/ -v -m "unit"
        # Note: Integration tests are not run in CI as they require DCI credentials
        # Run integration tests locally with: uv run pytest tests/ -v -m "integration"
        # Or use: bash scripts/run-checks.sh (runs all tests including integration)

  container-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - containerfile: Containerfile
            image: dci-mcp-server-test
          - containerfile: Containerfile.sse
            image: dci-mcp-server-sse-test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build container image (${{ matrix.containerfile }})
        run: docker build -t ${{ matrix.image }} -f ${{ matrix.containerfile }} .

      - name: Smoke-test container image (${{ matrix.containerfile }})
        run: |
          docker run --rm ${{ matrix.image }} \
            uv run python -c "from mcp_server.main import create_server; s = create_server(); print(s.name)"

      - name: Scan container image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
